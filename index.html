<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PRIVAT CASN 2026 - REKAM MEDIS</title>
    <style>
        :root { --p: #1a73e8; --s: #202124; --bg: #f8f9fa; --card: #ffffff; --success: #1e8e3e; --danger: #d93025; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--s); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 25px; }
        .badge { background: linear-gradient(90deg, #4285f4, #9b72cb); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid #dadce0; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--p); }
        .stat-label { font-size: 10px; color: #5f6368; text-transform: uppercase; }
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #e8eaed; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
        input[type="password"]:focus { border-color: var(--p); }
        .nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
        .nav button { flex: 1; padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; background: #f1f3f4; font-weight: bold; white-space: nowrap; transition: 0.2s; font-size: 13px; }
        .nav button:hover { background: #e8eaed; }
        .nav button.active { background: var(--p); color: white; }
        .q-box { background: white; border: 1px solid #dadce0; border-radius: 12px; padding: 20 text-align: left; padding: 20px; margin-bottom: 20px; }
        .opt-btn { display: block; width: 100%; text-align: left; padding: 14px; margin: 10px 0; border: 1.5px solid #dadce0; border-radius: 10px; cursor: pointer; background: white; font-size: 15px; transition: 0.2s; }
        .opt-btn:hover:not(:disabled) { background: #f8f9fa; border-color: var(--p); }
        .exp { display: none; background: #e8f0fe; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid var(--p); font-size: 14px; }
        #analysis-box { display: none; background: #fff8e1; border: 2px solid #fbbc04; padding: 20px; border-radius: 15px; margin-top: 25px; }
        .correct { background: #e6f4ea !important; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .wrong { background: #fce8e6 !important; border-color: var(--danger) !important; color: var(--danger); }
        #loading { display: none; text-align: center; padding: 30px; font-weight: bold; color: var(--p); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="badge">Gemini Multi-Model Engine</span>
        <h1>AI Tutor CASN 2026</h1>
        <p style="font-size: 14px; color: #5f6368;">Prediksi Spesifik: D3 Rekam Medis & SKD</p>
        <input type="password" id="api-key" placeholder="Tempelkan API Key Anda di sini...">
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="st-total">0</div><div class="stat-label">Latihan</div></div>
        <div class="stat-card"><div class="stat-val" id="st-avg">0%</div><div class="stat-label">Rata Skor</div></div>
        <div class="stat-card"><div class="stat-val" id="st-last">-</div><div class="stat-label">Terakhir</div></div>
    </div>

    <div class="nav">
        <button onclick="fetchQuestions('SKB Rekam Medis: RME & SatuSehat 2026')">RME Digital</button>
        <button onclick="fetchQuestions('SKB Rekam Medis: Koding ICD-10 & ICD-9')">Koding Medis</button>
        <button onclick="fetchQuestions('SKB Rekam Medis: Statistik RS (BOR, ALOS, TOI)')">Statistik RS</button>
        <button onclick="fetchQuestions('SKD CASN: TWK, TIU, TKP Campuran')">SKD Lengkap</button>
    </div>

    <div id="loading">🤖 AI sedang memproses soal terbaru...</div>
    <div id="quiz-area"></div>
    
    <div id="analysis-box">
        <h3 style="margin:0 0 10px 0;">📊 Analisis Kekurangan & Rekomendasi:</h3>
        <div id="analysis-text">Menghitung performa belajar Anda...</div>
    </div>
</div>

<script>
    let currentQuestions = [];
    let correctCount = 0;
    let answered = 0;
    let activeTopic = "";

    document.getElementById('api-key').addEventListener('input', (e) => {
        localStorage.setItem('casn_gemini_key', e.target.value);
    });

    window.onload = () => {
        const savedKey = localStorage.getItem('casn_gemini_key');
        if(savedKey) document.getElementById('api-key').value = savedKey;
        updateStats();
    };

    function updateStats() {
        const history = JSON.parse(localStorage.getItem('casn_history') || '[]');
        document.getElementById('st-total').innerText = history.length;
        if(history.length > 0) {
            const avg = history.reduce((a, b) => a + b.score, 0) / history.length;
            document.getElementById('st-avg').innerText = avg.toFixed(0) + '%';
            document.getElementById('st-last').innerText = history[history.length-1].score.toFixed(0) + '%';
        }
    }

    async function fetchQuestions(topic) {
        const key = document.getElementById('api-key').value;
        if(!key) return alert("Silakan isi API Key Gemini terlebih dahulu!");

        const loading = document.getElementById('loading');
        const area = document.getElementById('quiz-area');
        loading.style.display = "block";
        area.innerHTML = "";
        document.getElementById('analysis-box').style.display = "none";
        answered = 0; correctCount = 0; activeTopic = topic;

        const prompt = `Buat 5 soal pilihan ganda HOTS tentang ${topic} untuk CASN 2026. Format JSON: [{"q":"soal","o":["A","B","C","D"],"c":0,"e":"penjelasan"}]. Jangan berikan teks lain.`;

        // Daftar URL yang akan dicoba (Auto-Fallback)
        const urls = [
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`
        ];

        let success = false;
        for (let url of urls) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(data.error) continue; // Coba URL berikutnya jika gagal

                let rawText = data.candidates[0].content.parts[0].text;
                const start = rawText.indexOf('[');
                const end = rawText.lastIndexOf(']') + 1;
                
                currentQuestions = JSON.parse(rawText.substring(start, end));
                loading.style.display = "none";
                renderQuiz();
                success = true;
                break; 
            } catch (e) {
                console.error("Gagal mencoba URL:", url);
            }
        }

        if(!success) {
            loading.innerText = "❌ Gagal memanggil AI. Cek API Key atau tunggu 1 menit.";
        }
    }

    function renderQuiz() {
        const area = document.getElementById('quiz-area');
        currentQuestions.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'q-box';
            div.innerHTML = `
                <p><strong>Soal ${i+1}:</strong> ${s.q}</p>
                ${s.o.map((opt, idx) => `<button class="opt-btn" onclick="check(this, ${idx}, ${s.c}, ${i})">${opt}</button>`).join('')}
                <div class="exp" id="exp-${i}"><strong>Penjelasan:</strong> ${s.e}</div>
            `;
            area.appendChild(div);
        });
    }

    function check(btn, selected, correct, qIdx) {
        const btns = btn.parentElement.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);
        document.getElementById(`exp-${qIdx}`).style.display = "block";

        if(selected === correct) {
            btn.classList.add('correct');
            correctCount++;
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
        }

        answered++;
        if(answered === currentQuestions.length) getAIAnalysis();
    }

    async function getAIAnalysis() {
        const score = (correctCount / currentQuestions.length) * 100;
        const history = JSON.parse(localStorage.getItem('casn_history') || '[]');
        history.push({ score: score, date: new Date() });
        localStorage.setItem('casn_history', JSON.stringify(history));
        updateStats();

        const box = document.getElementById('analysis-box');
        const text = document.getElementById('analysis-text');
        box.style.display = "block";
        text.innerText = "AI sedang menganalisis kelemahanmu...";

        const key = document.getElementById('api-key').value;
        const prompt = `Saya skor ${score}% di ${activeTopic}. Analisis 2 kalimat kelemahan saya untuk tes CASN 2026.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            text.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            text.innerText = `Selesai! Skor Anda: ${score}%`;
        }
    }
</script>

</body>
</html>
