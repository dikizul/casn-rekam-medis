<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CASN 2026 - REKAM MEDIS</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn { background: #1a73e8; color: white; border: none; padding: 15px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; width: 100%; }
        .q-box { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; background: #fff; }
        .opt { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; text-align: left; background: #f9f9f9; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
        .error { color: red; background: #ffdce0; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🧠 AI Privat CASN 2026</h2>
    <p>D3 Rekam Medis & SKD</p>
    
    <button class="btn" onclick="tanyaAI('Rekam Medis: RME & Digital')">Mulai Latihan RME</button>
    <button class="btn" onclick="tanyaAI('Rekam Medis: Koding ICD-10')">Mulai Latihan Koding</button>
    <button class="btn" onclick="tanyaAI('SKD: TWK & TIU')">Mulai Latihan SKD</button>

    <div id="status"></div>
    <div id="quiz"></div>
</div>

<script>
    // MASUKKAN API KEY BARU KAMU DI BAWAH INI (TETAP DI DALAM TANDA KUTIP)
    const KUNCI_API = "TEMPEL_API_KEY_KAMU_DISINI"; 

    async function tanyaAI(topik) {
        const status = document.getElementById('status');
        const quiz = document.getElementById('quiz');
        
        status.innerHTML = "⏳ Sedang memproses soal...";
        quiz.innerHTML = "";

        const promptJSON = `Buat 3 soal pilihan ganda tentang ${topik} untuk tes CASN 2026. Berikan HANYA format JSON seperti ini: [{"q":"soal","o":["A","B","C","D"],"c":0}]`;

        // MENGGUNAKAN MODEL GEMINI-PRO (Paling stabil dan pasti didukung)
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${KUNCI_API}`;

        try {
            const respon = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: promptJSON }] }] })
            });

            const data = await respon.json();

            if (data.error) {
                status.innerHTML = `<div class="error">❌ GOOGLE ERROR: ${data.error.message} (Code: ${data.error.code})</div>`;
                return;
            }

            const teksMentah = data.candidates[0].content.parts[0].text;
            const bersih = teksMentah.substring(teksMentah.indexOf('['), teksMentah.lastIndexOf(']') + 1);
            const soalArray = JSON.parse(bersih);

            status.innerHTML = "✅ Berhasil! Selesaikan soal di bawah:";
            
            soalArray.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'q-box';
                div.innerHTML = `<p><strong>${i+1}. ${s.q}</strong></p>`;
                s.o.forEach((opsi, idx) => {
                    div.innerHTML += `<button class="opt" onclick="cekJawaban(this, ${idx}, ${s.c})">${opsi}</button>`;
                });
                quiz.appendChild(div);
            });

        } catch (e) {
            status.innerHTML = `<div class="error">❌ SISTEM ERROR: ${e.message}</div>`;
        }
    }

    function cekJawaban(btn, pilih, benar) {
        const semuaOpsi = btn.parentElement.querySelectorAll('.opt');
        semuaOpsi.forEach(b => b.disabled = true);
        if (pilih === benar) {
            btn.style.background = "#d4edda";
            btn.style.borderColor = "#28a745";
            btn.innerHTML += " ✅";
        } else {
            btn.style.background = "#f8d7da";
            btn.style.borderColor = "#dc3545";
            semuaOpsi[benar].style.background = "#d4edda";
            btn.innerHTML += " ❌";
        }
    }
</script>

</body>
</html>
