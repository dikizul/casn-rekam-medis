<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PRIVAT CASN 2026 - REKAM MEDIS</title>
    <style>
        :root { --p: #1a73e8; --s: #202124; --bg: #f8f9fa; --card: #ffffff; --success: #1e8e3e; --danger: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--s); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .badge { background: linear-gradient(90deg, #4285f4, #9b72cb); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #e8eaed; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input[type="password"]:focus { border-color: var(--p); }
        .nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
        .nav button { flex: 1; padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; background: #f1f3f4; font-weight: bold; white-space: nowrap; transition: 0.2s; font-size: 13px; }
        .nav button:hover { background: #e8eaed; }
        .nav button.active { background: var(--p); color: white; }
        .q-box { background: white; border: 1px solid #dadce0; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .opt-btn { display: block; width: 100%; text-align: left; padding: 14px; margin: 10px 0; border: 1.5px solid #dadce0; border-radius: 10px; cursor: pointer; background: white; font-size: 15px; transition: 0.2s; }
        .opt-btn:hover:not(:disabled) { background: #f8f9fa; border-color: var(--p); }
        .exp { display: none; background: #e8f0fe; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid var(--p); font-size: 14px; }
        #loading { display: none; text-align: center; padding: 30px; font-weight: bold; color: var(--p); }
        .correct { background: #e6f4ea !important; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .wrong { background: #fce8e6 !important; border-color: var(--danger) !important; color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="badge">AI PREDICTION ENGINE 2026</span>
        <h1>AI Tutor CASN 2026</h1>
        <p style="font-size: 14px; color: #5f6368;">D3 Rekam Medis & SKD Dasar</p>
        <input type="password" id="api-key" placeholder="Tempelkan API Key Anda di sini...">
    </div>

    <div class="nav">
        <button onclick="fetchQuestions('SKB Rekam Medis: RME & Digital Kesehatan')">RME Digital</button>
        <button onclick="fetchQuestions('SKB Rekam Medis: Koding ICD-10')">Koding Medis</button>
        <button onclick="fetchQuestions('SKD CASN: TWK & TIU')">SKD Lengkap</button>
    </div>

    <div id="loading">🤖 AI sedang memproses soal...</div>
    <div id="quiz-area"></div>
</div>

<script>
    let currentQuestions = [];
    let answered = 0;

    // Simpan Key Otomatis di Browser
    document.getElementById('api-key').addEventListener('input', (e) => {
        localStorage.setItem('casn_key_v1', e.target.value.trim());
    });

    window.onload = () => {
        const savedKey = localStorage.getItem('casn_key_v1');
        if(savedKey) document.getElementById('api-key').value = savedKey;
    };

    async function fetchQuestions(topic) {
        const key = document.getElementById('api-key').value.trim();
        if(!key) return alert("Silakan isi API Key Gemini!");

        const loading = document.getElementById('loading');
        const area = document.getElementById('quiz-area');
        loading.style.display = "block";
        loading.innerHTML = "🤖 AI sedang memproses soal...";
        area.innerHTML = "";
        answered = 0;

        const prompt = `Berikan 5 soal pilihan ganda CASN 2026 topik ${topic} dalam format JSON murni: [{"q":"soal","o":["A","B","C","D"],"c":0,"e":"penjelasan"}]. Jangan berikan teks lain.`;

        // Mencoba Versi API v1beta (Paling Umum Didukung)
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            
            if(data.error) {
                // Memberikan info error spesifik agar user tahu masalahnya
                throw new Error(`Google berkata: ${data.error.message} (Kode: ${data.error.code})`);
            }

            let rawText = data.candidates[0].content.parts[0].text;
            const start = rawText.indexOf('[');
            const end = rawText.lastIndexOf(']') + 1;
            
            if(start === -1) throw new Error("Format AI salah, silakan klik tombol lagi.");
            
            currentQuestions = JSON.parse(rawText.substring(start, end));
            loading.style.display = "none";
            renderQuiz();
        } catch (e) {
            loading.innerHTML = `<span style="color:red">❌ ERROR: ${e.message}</span><br><br><small>Saran: Jika error 429, tunggu 1 menit. Jika error 400/403, cek apakah API Key Anda valid dan "No Restrictions" di Google AI Studio.</small>`;
            console.error(e);
        }
    }

    function renderQuiz() {
        const area = document.getElementById('quiz-area');
        currentQuestions.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'q-box';
            div.innerHTML = `
                <p><strong>Soal ${i+1}:</strong> ${s.q}</p>
                ${s.o.map((opt, idx) => `<button class="opt-btn" onclick="check(this, ${idx}, ${s.c}, ${i})">${opt}</button>`).join('')}
                <div class="exp" id="exp-${i}"><strong>Penjelasan:</strong> ${s.e}</div>
            `;
            area.appendChild(div);
        });
    }

    function check(btn, selected, correct, qIdx) {
        const btns = btn.parentElement.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);
        document.getElementById(`exp-${qIdx}`).style.display = "block";
        if(selected === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
        }
    }
</script>

</body>
</html>
